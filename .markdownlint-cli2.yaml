config:
  default: true
  MD013: false
  MD033: false
  MD040: false
  MD041: false
  MD060: false
  # MD004 disables ul-style enforcement so a literal "+" at the start of
  # an indented continuation line (e.g. "OpenSSL 3.5+) and apt") isn't
  # misread as a "+"-style list item. We don't have any actual "+"-style
  # lists; this just prevents accidental misclassification on prose.
  MD004: false
  MD024:
    siblings_only: true
globs:
  - "**/*.md"
  - "!**/node_modules/**"
  - "!**/build*/**"
  - "!**/.git/**"
  - "!**/_deps/**"
  - "!**/vendor/**"
  - "!**/.venv/**"
  - "!**/*.egg-info/**"
